name: Release icons

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check generated files
        run: npm run check

      - name: Package release artifact
        run: |
          tag="v$(node -p "require('./package.json').version")"
          mkdir -p release
          cp dist/lobe-icons.ttf codepoints.json README.md LICENSE release/
          tar -czf "lobe-icons-font-$tag.tar.gz" -C release lobe-icons.ttf codepoints.json README.md LICENSE
          echo "tag=$tag" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create \
            "$tag" \
            dist/lobe-icons.ttf \
            codepoints.json \
            "lobe-icons-font-$tag.tar.gz" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Built from $GITHUB_SHA."
