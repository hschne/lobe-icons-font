min_version = "2024.9.5"

[env]
PROJECT_NAME = "{{ config_root | basename }}"
_.path = ["{{config_root}}/node_modules/.bin"]

[tools]
# Picked up from .ruby-version and .node-version

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby", "node"]

[tasks.install]
description = "Install JavaScript dependencies"
run = "npm ci"
sources = ["package.json", "package-lock.json"]

[tasks.build]
description = "Build the font"
run = "npm run build"
depends = ["install"]

[tasks.check]
description = "Run project checks"
run = "npm run check"
depends = ["install"]

[tasks."build:docs"]
description = "Generate the cheat sheet's font CSS, data, and TTF into docs/"
run = "npm run build:docs"
depends = ["build"]

[tasks."docs:install"]
description = "Install the Jekyll site's Ruby dependencies"
dir = "{{config_root}}/docs"
run = "bundle install"
sources = ["docs/Gemfile", "docs/Gemfile.lock"]

[tasks.serve]
description = "Build the font, generate site assets, and serve the cheat sheet"
dir = "{{config_root}}/docs"
run = "bundle exec jekyll serve"
depends = ["build:docs", "docs:install"]
