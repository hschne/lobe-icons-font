min_version = "2024.9.5"

[env]
PROJECT_NAME = "{{ config_root | basename }}"
_.path = ["{{config_root}}/node_modules/.bin"]

[tools]
# Picked up from .ruby-version and .node-version

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby", "node"]

[tasks.install]
description = "Install JavaScript dependencies"
run = "npm ci"
sources = ["package.json", "package-lock.json"]

[tasks.build]
description = "Build the font"
run = "npm run build"
depends = ["install"]

[tasks.check]
description = "Run project checks"
run = "npm run check"
depends = ["install"]
